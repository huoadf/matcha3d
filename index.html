<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matcha3D — Interactive Web Shape Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0e;
      --panel: #141419;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #ee8aff;
      --accent-glow: rgba(238, 138, 255, 0.35);
      --text: #f0f0f5;
      --muted: #8a8a9a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #viewport {
      flex: 1;
      position: relative;
      background: radial-gradient(circle at center, #181822 0%, #0b0b0e 100%);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .sidebar {
      width: 380px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 20px;
      overflow-y: auto;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: -14px;
    }

    .section {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
    }

    select, input[type="range"], input[type="color"], input[type="text"], textarea {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 12px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus, input:focus, textarea:focus {
      border-color: var(--accent);
    }

    input[type="range"] {
      padding: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .btn {
      background: var(--accent);
      color: #000;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    textarea {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      height: 120px;
      resize: none;
    }

    .toast {
      position: absolute;
      bottom: 24px;
      left: 24px;
      background: var(--panel);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="viewport">
    <div id="toast" class="toast">Code copied to clipboard!</div>
  </div>

  <div class="sidebar">
    <div class="header">
      <div class="dot"></div>
      <h1>Matcha3D Builder</h1>
    </div>
    <div class="subtitle">Custom 3D Mesh Generator for Roblox LuaVM</div>

    <div class="section">
      <div class="section-title">Shape Preset</div>
      <div class="form-group">
        <label for="shapeType">Preset Geometry</label>
        <select id="shapeType">
          <option value="mobius">Möbius Strip</option>
          <option value="trefoil">Torus Knot (3,2)</option>
          <option value="hyperboloid">Hyperboloid</option>
          <option value="pyramid">Pyramid</option>
        </select>
      </div>
      <div class="form-group">
        <label for="shapeColor">Color</label>
        <input type="color" id="shapeColor" value="#ee8aff">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Parameters</div>
      <div class="form-group">
        <label>Radius <span id="valRadius">1.5</span></label>
        <input type="range" id="paramRadius" min="0.5" max="4.0" step="0.1" value="1.5">
      </div>
      <div class="form-group">
        <label>Width / Height <span id="valScale">0.8</span></label>
        <input type="range" id="paramScale" min="0.2" max="3.0" step="0.1" value="0.8">
      </div>
      <div class="form-group">
        <label>Resolution (Segments) <span id="valSegs">24</span></label>
        <input type="range" id="paramSegs" min="8" max="48" step="2" value="24">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Export Options</div>
      <button class="btn" id="btnCopyJson">Copy JSON for URL Loader</button>
      <button class="btn btn-secondary" id="btnCopyLua">Copy Lua _G Snippet</button>
    </div>

    <div class="section">
      <div class="section-title">Generated JSON Payload</div>
      <textarea id="jsonOutput" readonly></textarea>
    </div>
  </div>

  <script>
    // Three.js Scene Setup
    const container = document.getElementById('viewport');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 3, 6);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xee8aff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Mesh Data State
    let currentMesh = null;
    let currentVertices = [];
    let currentTriangles = [];

    function generateMesh() {
      if (currentMesh) scene.remove(currentMesh);

      const type = document.getElementById('shapeType').value;
      const radius = parseFloat(document.getElementById('paramRadius').value);
      const scale = parseFloat(document.getElementById('paramScale').value);
      const segs = parseInt(document.getElementById('paramSegs').value);
      const colorHex = document.getElementById('shapeColor').value;

      document.getElementById('valRadius').innerText = radius;
      document.getElementById('valScale').innerText = scale;
      document.getElementById('valSegs').innerText = segs;

      currentVertices = [];
      currentTriangles = [];

      const geom = new THREE.BufferGeometry();

      if (type === 'mobius') {
        const R = radius, w = scale / 2;
        const pts = [];
        for (let i = 0; i <= segs; i++) {
          const u = (i / segs) * Math.PI * 2;
          const cosU = Math.cos(u), sinU = Math.sin(u);
          const cosHalf = Math.cos(u / 2), sinHalf = Math.sin(u / 2);

          const a = [(R - w * cosHalf) * cosU, -w * sinHalf, (R - w * cosHalf) * sinU];
          const b = [(R + w * cosHalf) * cosU,  w * sinHalf, (R + w * cosHalf) * sinU];

          currentVertices.push(a, b);
        }

        for (let i = 0; i < segs; i++) {
          const p1 = i * 2 + 1, p2 = i * 2 + 2;
          const p3 = (i + 1) * 2 + 1, p4 = (i + 1) * 2 + 2;
          currentTriangles.push([p1, p2, p3], [p2, p4, p3]);
        }
      } else if (type === 'trefoil') {
        const R = radius, w = scale;
        for (let i = 0; i <= segs; i++) {
          const t = (i / segs) * Math.PI * 2;
          const x = (Math.sin(t) + 2 * Math.sin(2 * t)) * R * 0.4;
          const y = -Math.sin(3 * t) * R * 0.4;
          const z = (Math.cos(t) - 2 * Math.cos(2 * t)) * R * 0.4;

          const dt = 0.01;
          const tx = (Math.sin(t + dt) + 2 * Math.sin(2 * (t + dt))) * R * 0.4 - x;
          const tz = (Math.cos(t + dt) - 2 * Math.cos(2 * (t + dt))) * R * 0.4 - z;

          let bx = -tz, bz = tx;
          const len = Math.sqrt(bx * bx + bz * bz);
          if (len > 0) { bx = (bx / len) * (w / 2); bz = (bz / len) * (w / 2); } else { bx = w / 2; bz = 0; }

          currentVertices.push([x - bx, y, z - bz], [x + bx, y, z + bz]);
        }

        for (let i = 0; i < segs; i++) {
          const p1 = i * 2 + 1, p2 = i * 2 + 2;
          const p3 = (i + 1) * 2 + 1, p4 = (i + 1) * 2 + 2;
          currentTriangles.push([p1, p2, p3], [p2, p4, p3]);
        }
      } else if (type === 'hyperboloid') {
        const Rbase = radius, Rwaist = scale, H = 2.0;
        const rings = 10;
        for (let ri = 0; ri <= rings; ri++) {
          const t = (ri / rings) * 2 - 1;
          const r = Math.sqrt(Rwaist * Rwaist + (t * t) * (Rbase * Rbase - Rwaist * Rwaist));
          const y = t * (H / 2);

          for (let s = 0; s < segs; s++) {
            const a = (s / segs) * Math.PI * 2;
            currentVertices.push([r * Math.cos(a), y + H / 2, r * Math.sin(a)]);
          }
        }

        for (let ri = 0; ri < rings; ri++) {
          for (let s = 0; s < segs; s++) {
            const ns = (s + 1) % segs;
            const p1 = ri * segs + s + 1;
            const p2 = ri * segs + ns + 1;
            const p3 = (ri + 1) * segs + s + 1;
            const p4 = (ri + 1) * segs + ns + 1;
            currentTriangles.push([p1, p2, p3], [p2, p4, p3]);
          }
        }
      } else {
        // Pyramid
        currentVertices = [
          [-radius, 0, -radius], [radius, 0, -radius],
          [radius, 0, radius], [-radius, 0, radius],
          [0, scale * 2, 0]
        ];
        currentTriangles = [
          [1, 2, 5], [2, 3, 5], [3, 4, 5], [4, 1, 5], [1, 2, 3], [1, 3, 4]
        ];
      }

      // Three.js Buffer Creation
      const flatVerts = [];
      const flatColor = new THREE.Color(colorHex);

      currentTriangles.forEach(tri => {
        const v1 = currentVertices[tri[0] - 1];
        const v2 = currentVertices[tri[1] - 1];
        const v3 = currentVertices[tri[2] - 1];
        if (v1 && v2 && v3) {
          flatVerts.push(...v1, ...v2, ...v3);
        }
      });

      geom.setAttribute('position', new THREE.Float32BufferAttribute(flatVerts, 3));
      geom.computeVertexNormals();

      const mat = new THREE.MeshPhongMaterial({
        color: flatColor,
        side: THREE.DoubleSide,
        wireframe: false,
        shininess: 80
      });

      currentMesh = new THREE.Mesh(geom, mat);
      scene.add(currentMesh);

      // Update JSON Output Box
      const r = parseInt(colorHex.slice(1,3), 16);
      const g = parseInt(colorHex.slice(3,5), 16);
      const b = parseInt(colorHex.slice(5,7), 16);

      const jsonPayload = {
        name: type.toUpperCase(),
        color: [r, g, b],
        vertices: currentVertices.map(v => [parseFloat(v[0].toFixed(3)), parseFloat(v[1].toFixed(3)), parseFloat(v[2].toFixed(3))]),
        triangles: currentTriangles
      };

      document.getElementById('jsonOutput').value = JSON.stringify(jsonPayload, null, 2);
    }

    // Event Listeners
    document.getElementById('shapeType').addEventListener('change', generateMesh);
    document.getElementById('paramRadius').addEventListener('input', generateMesh);
    document.getElementById('paramScale').addEventListener('input', generateMesh);
    document.getElementById('paramSegs').addEventListener('input', generateMesh);
    document.getElementById('shapeColor').addEventListener('input', generateMesh);

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    document.getElementById('btnCopyJson').addEventListener('click', () => {
      const text = document.getElementById('jsonOutput').value;
      navigator.clipboard.writeText(text);
      showToast('JSON mesh copied to clipboard!');
    });

    document.getElementById('btnCopyLua').addEventListener('click', () => {
      const text = document.getElementById('jsonOutput').value;
      const data = JSON.parse(text);
      const lua = `_G.LoadCustomShape(\n  ${JSON.stringify(data.vertices)},\n  ${JSON.stringify(data.triangles)},\n  Color3.fromRGB(${data.color.join(', ')})\n)`;
      navigator.clipboard.writeText(lua);
      showToast('Lua _G snippet copied to clipboard!');
    });

    // Animation Loop
    function animate() {
      requestAnimationFrame(animate);
      if (currentMesh) {
        currentMesh.rotation.y += 0.01;
      }
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    generateMesh();
    animate();
  </script>
</body>
</html>
